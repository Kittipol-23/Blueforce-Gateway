<head>

</head>

  <div class="lang-toggle">
    <span class="lang-btn active" data-lang="en">EN</span> / <span class="lang-btn" data-lang="th">TH</span>
    <span class="theme-toggle" id="theme-toggle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
    <a href="login.html" class="cloud-toggle" id="cloud-toggle" title="Blueforce Cloud"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg></a>
  </div>

  <div class="page-header" data-i18n="sys_comms">SYSTEM // COMMUNICATIONS // v.1.0.0</div>

  <div class="subpage-container">
    <a href="index.html" class="back-link" data-i18n="back_root">RETURN TO ROOT DIRECTORY</a>
    
    <div class="diagram-container" style="min-height: auto; align-items: flex-start; padding-left: 0;">
      <div class="node subpage-node" style="min-width: 300px;">
        <div class="tags">
          <span data-i18n="tag_com_node">COM_NODE</span>
          <span data-i18n="tag_secure">SECURE</span>
        </div>
        <span data-i18n="node_07_full">07 / SECURE COMMS LINK</span>
      </div>

      <div class="connector-right" style="margin-top: 15px; width: 60px;"></div>

      <div class="subpage-details" style="margin-top: -30px; margin-left: 10px;">
        <div class="decorative-line"></div>
        <p style="margin-bottom: 30px; font-weight: 300; font-size: 14px;" data-i18n="desc_contact">Establish a secure transmission to Blueforce Holding Corporation Headquarters. All messages are heavily encrypted.</p>
        
        <form style="display: flex; flex-direction: column; gap: 15px; font-family: var(--font-mono); font-size: 12px; width: 400px; max-width: 100%;">
          <input type="text" placeholder="TRANSMITTER ID (NAME)" style="padding: 10px; border: 1px solid var(--line-color); font-family: var(--font-mono); font-size: 11px;">
          <input type="email" placeholder="RETURN COORDINATES (EMAIL)" style="padding: 10px; border: 1px solid var(--line-color); font-family: var(--font-mono); font-size: 11px;">
          <textarea placeholder="ENCRYPTED PAYLOAD (MESSAGE)" rows="5" style="padding: 10px; border: 1px solid var(--line-color); font-family: var(--font-mono); font-size: 11px; resize: vertical;"></textarea>
          <button type="button" style="background: #000; color: #fff; padding: 12px; border: none; font-family: var(--font-mono); cursor: pointer; transition: background 0.3s; margin-top: 10px;" onmouseover="this.style.background='#008bc6'" onmouseout="this.style.background='#000'" data-i18n="btn_transmit">TRANSMIT SIGNAL</button>
        </form>
      </div>
    </div>
  </div>
  
  <div class="global-footer">
